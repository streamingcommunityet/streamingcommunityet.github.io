<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-link">Forside</a>
</nav>

<section class="hero">
    <h1>Admin Login</h1>
    <p>Kun ejeren af siden kan logge ind</p>

    <input type="password" id="password" placeholder="Adgangskode"
           style="padding:12px; margin-top:20px; width:250px;">

    <br>

    <button class="btn" onclick="checkPassword()">Login</button>

    <h2 id="msg" style="margin-top:20px;"></h2>
</section>

<script>
function checkPassword(){
    const pass = document.getElementById("password").value;

    // SKIFT DEN HER KODE SENERE HVIS DU VIL
    if(pass === "NøglensKvarter117"){
        document.getElementById("msg").style.color = "lightgreen";
        document.getElementById("msg").innerText = "Login godkendt...";

        // her sender vi videre til en “skjult side”
        setTimeout(() => {
            window.location.href = "admin-panel.html";
        }, 800);

    } else {
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Forkert kode";
    }
}
</script>

</body>
</html>
